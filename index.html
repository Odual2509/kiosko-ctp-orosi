<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Kiosko Comedor - CTP Orosi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100vh; width: 100%;
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0a0a0a; color: white;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    body {
      overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .kiosko-wrapper {
      min-height: 100vh; display: flex; flex-direction: column;
      background: linear-gradient(180deg, #0a0a0a 0%, #111827 100%);
    }

    /* ===== HEADER ===== */
    .topbar {
      padding: 12px 16px; display: flex; justify-content: space-between;
      align-items: center; border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0; gap: 8px; flex-wrap: wrap;
    }
    .topbar .titulo {
      font-weight: 900; font-size: 15px; letter-spacing: -0.3px;
      white-space: nowrap;
    }
    .topbar .titulo .accent { color: #3b82f6; }
    .topbar .estado {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; color: #94a3b8;
    }
    .estado-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #16a34a;
      animation: pulse 1.5s infinite; flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ===== MAIN ===== */
    .main {
      flex: 1; display: grid;
      grid-template-columns: 1fr 360px;
      gap: 12px; padding: 12px; min-height: 0;
    }
    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
      }
    }

    /* ===== ZONA CÁMARA ===== */
    .camara-zona {
      background: #000; border-radius: 14px;
      overflow: hidden; position: relative;
      aspect-ratio: 4/3;
      min-height: 320px;
      display: flex; align-items: center; justify-content: center;
    }
    @media (max-width: 900px) {
      .camara-zona {
        aspect-ratio: 1/1;
        min-height: 280px;
        max-height: 70vh;
      }
    }
    #qr-reader {
      width: 100% !important; height: 100% !important;
    }
    #qr-reader video {
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
    }
    #qr-reader__dashboard,
    #qr-reader__header_message,
    #qr-reader__camera_selection {
      display: none !important;
    }
    #qr-reader__scan_region {
      background: transparent !important;
      border: 0 !important;
    }
    #qr-reader__scan_region img {
      display: none !important;
    }

    /* Marco de escaneo */
    .scan-marco {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(70%, 240px); aspect-ratio: 1;
      border: 3px solid #3b82f6; border-radius: 20px;
      pointer-events: none; z-index: 10;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
    }
    .scan-marco::before, .scan-marco::after {
      content: ''; position: absolute; width: 32px; height: 32px;
      border: 4px solid #fbbf24;
    }
    .scan-marco::before {
      top: -3px; left: -3px;
      border-right: 0; border-bottom: 0; border-radius: 18px 0 0 0;
    }
    .scan-marco::after {
      bottom: -3px; right: -3px;
      border-left: 0; border-top: 0; border-radius: 0 0 18px 0;
    }
    .scan-line {
      position: absolute; left: 0; right: 0; top: 0;
      height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent);
      animation: scanline 2s linear infinite;
    }
    @keyframes scanline {
      0% { top: 0; } 50% { top: 100%; } 100% { top: 0; }
    }
    .scan-msg {
      position: absolute; bottom: 16px; left: 50%;
      transform: translateX(-50%); z-index: 10;
      background: rgba(0,0,0,0.75); color: white;
      padding: 8px 16px; border-radius: 30px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      white-space: nowrap;
    }

    /* ===== PANEL LATERAL ===== */
    .panel {
      display: flex; flex-direction: column; gap: 12px;
    }
    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 14px;
    }
    .stat-card .titulo {
      font-size: 10px; color: #94a3b8; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .stat-card .num {
      font-size: 32px; font-weight: 900; line-height: 1;
    }
    .stat-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .stat-mini {
      background: rgba(255,255,255,0.04); border-radius: 10px;
      padding: 10px; text-align: center;
    }
    .stat-mini .num { font-size: 20px; font-weight: 800; }
    .stat-mini .lbl { font-size: 10px; color: #94a3b8; text-transform: uppercase; margin-top: 2px; }
    .stat-mini.beca .num { color: #22c55e; }
    .stat-mini.tiq .num { color: #f59e0b; }

    .ultimos { display: flex; flex-direction: column; }
    .ultimos h3 {
      font-size: 10px; color: #94a3b8; letter-spacing: 1px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    .ultimos-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 300px; overflow-y: auto;
    }
    .ultimo-item {
      background: rgba(255,255,255,0.04);
      border-left: 3px solid #3b82f6;
      padding: 8px 10px; border-radius: 8px;
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px;
    }
    .ultimo-item.beca { border-left-color: #22c55e; }
    .ultimo-item.tiquete { border-left-color: #f59e0b; }
    .ultimo-item .nom {
      font-weight: 600; font-size: 12px; line-height: 1.2;
    }
    .ultimo-item .meta {
      font-size: 10px; color: #94a3b8; margin-top: 2px;
    }
    .ultimo-item .hora {
      font-family: Consolas, monospace;
      font-size: 11px; color: #94a3b8; flex-shrink: 0;
    }
    .ultimo-vacio {
      text-align: center; color: #64748b;
      padding: 20px; font-size: 12px;
    }

    /* ===== OVERLAY DE RESULTADO ===== */
    .overlay {
      position: fixed; inset: 0; z-index: 1000;
      display: none; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75);
      animation: fadein 0.2s ease;
      padding: 16px;
    }
    .overlay.activo { display: flex; }
    .overlay-card {
      background: linear-gradient(135deg, var(--c1), var(--c2));
      width: 100%; max-width: 460px;
      border-radius: 20px; padding: 32px 24px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: scalein 0.3s cubic-bezier(.4,1.5,.6,1);
    }
    .overlay-card.ok { --c1: #16a34a; --c2: #14532d; }
    .overlay-card.err { --c1: #dc2626; --c2: #7f1d1d; }
    .overlay-card.warn { --c1: #94a3b8; --c2: #475569; }

    .overlay-icon {
      font-size: 64px; margin-bottom: 12px;
      animation: bounce 0.5s ease;
      line-height: 1;
    }
    @keyframes bounce {
      0%, 60% { transform: scale(0); }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .overlay-titulo {
      font-size: 28px; font-weight: 900; margin-bottom: 6px;
      letter-spacing: -0.5px; line-height: 1.1;
      word-break: break-word;
    }
    .overlay-msg {
      font-size: 16px; opacity: 0.95; margin-bottom: 14px;
    }
    .overlay-tag {
      display: inline-block;
      background: rgba(0,0,0,0.3);
      padding: 8px 18px; border-radius: 30px;
      font-weight: 700; font-size: 14px; letter-spacing: 1px;
    }
    .overlay-meta {
      margin-top: 14px; font-size: 12px; opacity: 0.8;
    }

    @keyframes fadein {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes scalein {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ===== INICIO ===== */
    .inicio {
      position: absolute; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: #0a0a0a;
      padding: 16px;
    }
    .inicio-card {
      text-align: center;
    }
    .inicio-card h2 {
      font-size: 22px; font-weight: 900; margin-bottom: 6px;
    }
    .inicio-card p {
      color: #94a3b8; margin-bottom: 20px; font-size: 13px;
    }
    .btn-iniciar {
      background: linear-gradient(135deg, #3b82f6, #1e40af);
      color: white; border: 0; padding: 14px 32px;
      font-size: 16px; font-weight: 700; border-radius: 12px;
      cursor: pointer; transition: transform 0.15s;
      font-family: inherit;
    }
    .btn-iniciar:active { transform: scale(0.96); }

    /* Botones flotantes (móvil) */
    .btn-flotante {
      position: absolute; top: 12px; right: 12px;
      z-index: 50;
      background: rgba(0,0,0,0.6);
      color: white; border: 1px solid rgba(255,255,255,0.2);
      width: 40px; height: 40px;
      border-radius: 50%; cursor: pointer;
      font-size: 18px;
      display: none;
      align-items: center; justify-content: center;
    }
    .btn-flotante.visible { display: flex; }
  </style>
</head>
<body>

  <div class="kiosko-wrapper">

    <!-- HEADER -->
    <div class="topbar">
      <div class="titulo">
        <span class="accent">●</span> CTP Orosi · Comedor
      </div>
      <div class="estado">
        <span class="estado-dot"></span>
        <span id="estadoTexto">Activo</span>
        <span style="margin-left:8px" id="fechaActual"></span>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">

      <!-- ZONA CÁMARA -->
      <div class="camara-zona">
        <!-- Pantalla inicial -->
        <div class="inicio" id="inicioPanel">
          <div class="inicio-card">
            <h2>📷 Listo para escanear</h2>
            <p>Presione "Iniciar" para activar la cámara<br>y comenzar a registrar estudiantes.</p>
            <button class="btn-iniciar" onclick="Kiosko.iniciar()">Iniciar Kiosko</button>
          </div>
        </div>

        <!-- Botón cambiar cámara (móvil) -->
        <button class="btn-flotante" id="btnFlip" onclick="Kiosko.cambiarCamara()" title="Cambiar cámara">⟲</button>

        <!-- Lector QR -->
        <div id="qr-reader" style="width:100%;height:100%"></div>
        <div class="scan-marco" id="scanMarco" style="display:none">
          <div class="scan-line"></div>
        </div>
        <div class="scan-msg" id="scanMsg" style="display:none">
          Coloque el carné dentro del marco
        </div>
      </div>

      <!-- PANEL LATERAL -->
      <div class="panel">

        <div class="stat-card">
          <div class="titulo">Total servidos hoy</div>
          <div class="num" id="kStatTotal">0</div>
        </div>

        <div class="stat-grid">
          <div class="stat-mini beca">
            <div class="num" id="kStatBeca">0</div>
            <div class="lbl">Becados</div>
          </div>
          <div class="stat-mini tiq">
            <div class="num" id="kStatTiq">0</div>
            <div class="lbl">Tiquetes</div>
          </div>
        </div>

        <div class="ultimos stat-card">
          <h3>Últimos 8 registros</h3>
          <div class="ultimos-list" id="ultimosList">
            <div class="ultimo-vacio">Sin registros aún</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- OVERLAY DE RESULTADO -->
  <div class="overlay" id="overlay">
    <div class="overlay-card" id="overlayCard">
      <div class="overlay-icon" id="overlayIcon">✓</div>
      <div class="overlay-titulo" id="overlayTitulo">—</div>
      <div class="overlay-msg" id="overlayMsg">—</div>
      <div class="overlay-tag" id="overlayTag" style="display:none">—</div>
      <div class="overlay-meta" id="overlayMeta">—</div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIGURACIÓN
    // ============================================================
    var BACKEND_URL = 'https://script.google.com/macros/s/AKfycbyH3FrNZdeEpyQky_mkOfXA0Imfvw1xTXRgD-2jOj7A-SpzEGyy8jP00Xgtf2AoHQA/exec';
    var KIOSKO_CLAVE = 'ctp2026';
    var TIEMPO_OVERLAY = 2500;  // ms que dura el overlay visible
    var ANTI_REBOTE = 5000;     // ms para ignorar misma cédula

    var Kiosko = {
      scanner: null,
      ultimaCedula: '',
      ultimaCedulaTime: 0,
      audioCtx: null,
      camaraActual: 'environment',
      escaneando: false
    };

    // ============ API VIA FETCH ============
    Kiosko.api = function(fn, args) {
      return fetch(BACKEND_URL, {
        method: 'POST',
        body: JSON.stringify({ clave: KIOSKO_CLAVE, fn: fn, args: args || [] })
      }).then(function(r) { return r.json(); });
    };

    // ============ FECHA ============
    Kiosko.actualizarFecha = function() {
      var d = new Date();
      var f = d.toLocaleDateString('es-CR', {
        weekday: 'short', day: 'numeric', month: 'short'
      });
      var h = d.toLocaleTimeString('es-CR', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('fechaActual').textContent = f + ' · ' + h;
    };

    // ============ INICIAR CÁMARA ============
    Kiosko.iniciar = function() {
      // Pre-check librería
      if (typeof Html5Qrcode === 'undefined') {
        alert('❌ La librería de QR no se cargó. Recarga la página (F5).');
        return;
      }

      document.getElementById('inicioPanel').style.display = 'none';
      document.getElementById('scanMarco').style.display = 'block';
      document.getElementById('scanMsg').style.display = 'block';
      document.getElementById('btnFlip').classList.add('visible');

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('❌ Tu navegador no soporta cámara.');
        Kiosko.volverInicio();
        return;
      }

      navigator.mediaDevices.getUserMedia({ video: { facingMode: Kiosko.camaraActual } })
        .then(function(stream) {
          stream.getTracks().forEach(function(t) { t.stop(); });
          Kiosko.iniciarScanner();
        })
        .catch(function(err) {
          var msg = '❌ Cámara: ' + err.name + ' - ' + err.message;
          if (err.name === 'NotAllowedError') {
            msg = '🔒 Permiso de cámara denegado.\n\nActiva el permiso en el ícono de candado junto a la URL.';
          }
          alert(msg);
          Kiosko.volverInicio();
        });
    };

    Kiosko.iniciarScanner = function() {
      Kiosko.scanner = new Html5Qrcode("qr-reader");
      var config = {
        fps: 10,
        qrbox: function(w, h) {
          var min = Math.min(w, h);
          var size = Math.floor(min * 0.7);
          return { width: size, height: size };
        },
        aspectRatio: 1.0,
        disableFlip: false
      };

      Kiosko.scanner.start(
        { facingMode: Kiosko.camaraActual },
        config,
        Kiosko.onScanExito,
        function() {} // silencioso
      ).then(function() {
        Kiosko.escaneando = true;
      }).catch(function(err) {
        alert('❌ Error iniciando lector: ' + err.message);
        Kiosko.volverInicio();
      });
    };

    Kiosko.volverInicio = function() {
      document.getElementById('inicioPanel').style.display = 'flex';
      document.getElementById('scanMarco').style.display = 'none';
      document.getElementById('scanMsg').style.display = 'none';
      document.getElementById('btnFlip').classList.remove('visible');
      Kiosko.escaneando = false;
    };

    // ============ CAMBIAR CÁMARA (frontal/trasera) ============
    Kiosko.cambiarCamara = function() {
      if (!Kiosko.scanner || !Kiosko.escaneando) return;
      Kiosko.scanner.stop().then(function() {
        Kiosko.camaraActual = (Kiosko.camaraActual === 'environment') ? 'user' : 'environment';
        Kiosko.iniciarScanner();
      }).catch(function() {});
    };

    // ============ AL ESCANEAR ============
    Kiosko.onScanExito = function(decodedText) {
      var ahora = Date.now();

      // Anti-rebote: misma cédula muy seguida
      if (decodedText === Kiosko.ultimaCedula && (ahora - Kiosko.ultimaCedulaTime) < ANTI_REBOTE) {
        return;
      }

      Kiosko.ultimaCedula = decodedText;
      Kiosko.ultimaCedulaTime = ahora;

      // 🛑 PAUSAR scanner inmediatamente
      if (Kiosko.scanner && Kiosko.scanner.pause) {
        try { Kiosko.scanner.pause(true); } catch (e) {}
      }

      Kiosko.beep(true);
      Kiosko.vibrar([100]);

      Kiosko.api('comedorRegistrar', [decodedText, 'KIOSKO'])
        .then(Kiosko.mostrarResultado)
        .catch(function(err) {
          Kiosko.mostrarResultado({ ok: false, mensaje: 'Error de red: ' + err.message });
        });
    };

    // ============ MOSTRAR RESULTADO ============
    Kiosko.mostrarResultado = function(res) {
      var card = document.getElementById('overlayCard');
      var icon = document.getElementById('overlayIcon');
      var titulo = document.getElementById('overlayTitulo');
      var msg = document.getElementById('overlayMsg');
      var tag = document.getElementById('overlayTag');
      var meta = document.getElementById('overlayMeta');

      if (res && res.ok) {
        var d = res.data;
        card.className = 'overlay-card ok';
        icon.textContent = '✓';
        titulo.textContent = d.nombre || '';
        msg.textContent = (d.seccion || '') + ' · ' + (d.nivel || '');
        tag.style.display = 'inline-block';
        tag.textContent = d.tipo === 'Beca' ? '★ BECA' : '◆ TIQUETE';
        meta.textContent = '✓ Registrado a las ' + (d.hora || '');
      } else {
        var esDuplicado = res && res.data && res.data.duplicado;
        card.className = esDuplicado ? 'overlay-card warn' : 'overlay-card err';
        icon.textContent = esDuplicado ? '⊘' : '✗';
        titulo.textContent = esDuplicado ? 'Ya registrado' : 'No válido';
        msg.textContent = (res && res.mensaje) || 'Error desconocido';
        tag.style.display = 'none';
        meta.textContent = '';
        Kiosko.beep(false);
        Kiosko.vibrar([100, 50, 100]);
      }

      document.getElementById('overlay').classList.add('activo');

      setTimeout(function() {
        document.getElementById('overlay').classList.remove('activo');

        // ▶️ REANUDAR scanner
        if (Kiosko.scanner && Kiosko.scanner.resume) {
          try { Kiosko.scanner.resume(); } catch (e) {}
        }
      }, TIEMPO_OVERLAY);

      Kiosko.refrescarStats();
    };

    // ============ STATS ============
    Kiosko.refrescarStats = function() {
      Kiosko.api('comedorStats', [null]).then(function(res) {
        if (res && res.ok && res.data) {
          document.getElementById('kStatTotal').textContent = res.data.total || 0;
          document.getElementById('kStatBeca').textContent = res.data.becados || 0;
          document.getElementById('kStatTiq').textContent = res.data.tiquetes || 0;
        }
      }).catch(function(){});

      Kiosko.api('comedorRegistrosDia', [null]).then(function(res) {
        if (!res || !res.ok) return;
        var lista = document.getElementById('ultimosList');
        var arr = (res.data || []).slice(0, 8);
        if (arr.length === 0) {
          lista.innerHTML = '<div class="ultimo-vacio">Sin registros aún</div>';
          return;
        }
        var html = '';
        for (var i = 0; i < arr.length; i++) {
          var r = arr[i];
          var cls = r.tipo === 'Beca' ? 'beca' : r.tipo === 'Tiquete' ? 'tiquete' : '';
          html +=
            '<div class="ultimo-item ' + cls + '">' +
              '<div style="min-width:0;flex:1">' +
                '<div class="nom">' + (r.nombre || '') + '</div>' +
                '<div class="meta">' + (r.seccion || '') + ' · ' + (r.tipo || '') + '</div>' +
              '</div>' +
              '<div class="hora">' + (r.hora || '') + '</div>' +
            '</div>';
        }
        lista.innerHTML = html;
      }).catch(function(){});
    };

    // ============ AUDIO + VIBRACIÓN ============
    Kiosko.beep = function(exito) {
      try {
        if (!Kiosko.audioCtx) {
          Kiosko.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        var ctx = Kiosko.audioCtx;
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = exito ? 1200 : 350;
        osc.type = exito ? 'sine' : 'square';
        gain.gain.setValueAtTime(0.18, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (exito ? 0.18 : 0.4));
        osc.start();
        osc.stop(ctx.currentTime + (exito ? 0.18 : 0.4));
      } catch (e) {}
    };

    Kiosko.vibrar = function(pattern) {
      try { if (navigator.vibrate) navigator.vibrate(pattern); } catch (e) {}
    };

    // ============ ARRANQUE ============
    Kiosko.actualizarFecha();
    setInterval(Kiosko.actualizarFecha, 30000);
    Kiosko.refrescarStats();
    setInterval(Kiosko.refrescarStats, 60000);
  </script>
</body>
</html>
